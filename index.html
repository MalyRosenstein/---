<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Voice Recipe Book</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode" id="bodyTag">

    <div id="addRecipeModal" class="screen hidden" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; width: 90%; max-width: 400px; box-shadow: 0 0 25px rgba(0,0,0,0.3); background: white; padding: 25px; border-radius: 15px; border: 1px solid #ddd;">
        <h2 style="margin-top: 0; color: #2d3436;">Add New Recipe</h2>
        <input type="text" id="newTitle" placeholder="Recipe Title">
        <input type="text" id="newIngredients" placeholder="Ingredients (comma separated)">
        <textarea id="newInstructions" placeholder="Instructions (each step in a new line)" style="width: 100%; height: 100px; border-radius: 12px; padding: 12px; margin: 10px 0; border: 2px solid #e0e0e0; font-family: inherit; resize: none;"></textarea>
        <button onclick="app.saveNewRecipe()">Save Recipe</button>
        <button onclick="app.closeModal()" style="background: #b2bec3; margin-top: 10px;">Cancel</button>
    </div>

    <section id="loginScreen" class="screen">
        <h2>Welcome!</h2>
        <p>Please log in to start cooking</p>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="app.login()">Login</button>
    </section>

    <section id="recipeListScreen" class="screen hidden">
        <header class="list-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0;">My Recipes</h2>
            <button class="settings-icon" onclick="app.showScreen('settingsScreen')" style="width: auto; background: none; border: none; font-size: 24px; cursor: pointer; padding: 0;">⚙️</button>
        </header>
        <input type="text" id="searchInput" placeholder="Search recipe..." oninput="app.filterRecipes()">
        <div id="recipesContainer"></div>
        <button class="add-btn" onclick="app.addRecipePrompt()" style="margin-top: 20px; background-color: var(--primary-color);">+ Add New Recipe</button>
    </section>

    <section id="recipeViewScreen" class="screen hidden">
        <button class="back-btn" onclick="app.showScreen('recipeListScreen')" style="background: #b2bec3; margin-bottom: 20px;">⬅️ Back to List</button>
        <h2 id="viewTitle"></h2>
        <div class="recipe-content" style="text-align: left; margin-bottom: 25px;">
            <h3 style="color: var(--primary-color);">Ingredients:</h3>
            <p id="viewIngredients" style="line-height: 1.6;"></p>
            <h3 style="color: var(--primary-color); margin-top: 15px;">Instructions:</h3>
            <div id="viewInstructions" style="line-height: 1.6;"></div>
        </div>
        <div class="controls">
            <button id="speakBtn" onclick="app.startReading()">▶️ Read Aloud</button>
            <button id="pauseBtn" onclick="app.togglePause()" style="background: #f39c12;">⏸️ Pause</button> 
            <button class="stop-btn" onclick="app.stopReading()">⏹️ Stop</button>
        </div>
    </section>

    <section id="settingsScreen" class="screen hidden">
        <h2>Settings</h2>
        <div class="setting-item" style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px;">Wait time between lines (sec):</label>
            <input type="number" id="delayInput" min="1" max="10">
        </div>
        <div class="setting-item" style="margin-bottom: 25px;">
            <label style="display: block; margin-bottom: 8px;">Theme:</label>
            <select id="themeSelect" onchange="app.saveSettings()">
                <option value="light">Light Mode ☀️</option>
                <option value="dark">Dark Mode 🌙</option>
            </select>
        </div>
        <button onclick="app.saveSettings()">Save & Back</button>
    </section>

    <script src="script.js"></script>
</body>
</html>
